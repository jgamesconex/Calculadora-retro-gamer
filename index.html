<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Gamer Calc - 425px Edition</title>
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: #050505;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Ajustado para comportar o botão abaixo */
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* --- ANIMAÇÃO DE FUNDO RETRO --- */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #240b36 0%, #000 100%);
            z-index: -1;
        }

        .grid {
            position: absolute;
            width: 200%;
            height: 600px;
            bottom: -100px;
            left: -50%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 0, 255, 0.3) 25%, rgba(255, 0, 255, 0.3) 26%, transparent 27%, transparent 74%, rgba(255, 0, 255, 0.3) 75%, rgba(255, 0, 255, 0.3) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.3) 25%, rgba(0, 255, 255, 0.3) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.3) 75%, rgba(0, 255, 255, 0.3) 76%, transparent 77%, transparent);
            background-size: 60px 60px;
            transform: perspective(300px) rotateX(60deg);
            animation: moveGrid 2s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 60px; }
        }

        /* --- CALCULADORA 425PX --- */
        .calculator {
            background: rgba(20, 20, 20, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #0ff;
            box-shadow: 0 0 30px #0ff, inset 0 0 15px #f0f;
            width: 425px;
            position: relative;
        }

        .retro-clock {
            text-align: center;
            color: #f0f;
            font-size: 26px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f0f;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            border: 2px dashed #f0f;
        }

        .display {
            width: 100%;
            height: 75px;
            background: #000;
            border: 2px solid #f0f;
            margin-bottom: 22px;
            text-align: right;
            padding: 18px;
            font-size: 34px;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            padding: 20px 5px;
            font-size: 21px;
            border: none;
            background: #2a2a2a;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.1s;
            border-bottom: 5px solid #111;
        }

        button:active {
            transform: translateY(4px);
            border-bottom: 1px solid #111;
        }

        button.op { color: #f0f; text-shadow: 0 0 8px #f0f; font-weight: bold; }
        button.num:hover { background: #333; box-shadow: 0 0 12px #0ff; }
        
        button.equal { 
            grid-column: span 2; 
            background: #0ff; 
            color: #000; 
            font-weight: bold; 
        }
        button.equal:hover { background: #fff; box-shadow: 0 0 20px #0ff; }
        button.clear { color: #ff4d4d; font-weight: bold; }

        /* --- BOTÃO DE APOIADORES --- */
        .support-container {
            margin-top: 25px;
            text-align: center;
        }

        .btn-donate {
            display: inline-block;
            padding: 12px 25px;
            background: transparent;
            color: #f0f;
            border: 2px solid #f0f;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
            transition: 0.3s;
            text-shadow: 0 0 5px #f0f;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }

        .btn-donate:hover {
            background: #f0f;
            color: #000;
            box-shadow: 0 0 20px #f0f;
        }

    </style>
</head>
<body>

    <div class="background">
        <div class="grid"></div>
    </div>

    <div class="calculator">
        <div class="retro-clock" id="clock">00:00:00</div>

        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="op" onclick="appendToDisplay('/')">/</button>
            <button class="op" onclick="appendToDisplay('*')">x</button>
            <button class="op" onclick="backspace()">«</button>
            
            <button class="num" onclick="appendToDisplay('7')">7</button>
            <button class="num" onclick="appendToDisplay('8')">8</button>
            <button class="num" onclick="appendToDisplay('9')">9</button>
            <button class="op" onclick="appendToDisplay('-')">-</button>
            
            <button class="num" onclick="appendToDisplay('4')">4</button>
            <button class="num" onclick="appendToDisplay('5')">5</button>
            <button class="num" onclick="appendToDisplay('6')">6</button>
            <button class="op" onclick="appendToDisplay('+')">+</button>
            
            <button class="num" onclick="appendToDisplay('1')">1</button>
            <button class="num" onclick="appendToDisplay('2')">2</button>
            <button class="num" onclick="appendToDisplay('3')">3</button>
            <button class="op" onclick="calculate()">=</button>
            
            <button class="num" style="grid-column: span 2;" onclick="appendToDisplay('0')">0</button>
            <button class="num" onclick="appendToDisplay('.')">.</button>
            <button class="equal" onclick="calculate()">ENTER</button>
        </div>
    </div>

    <div class="support-container">
        <a href="https://mpago.la/19wcCPv" target="_blank" class="btn-donate">
            APOIAR PROJETO (Mercado Pago)
        </a>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'click') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } 
            else if (type === 'success') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            }
            else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        const display = document.getElementById('display');

        function appendToDisplay(input) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            playSound('click');
            if (display.innerText === '0' || display.innerText === 'Erro') {
                display.innerText = input;
            } else {
                display.innerText += input;
            }
        }

        function clearDisplay() {
            playSound('click');
            display.innerText = '0';
        }

        function backspace() {
            playSound('click');
            if (display.innerText.length > 1) {
                display.innerText = display.innerText.slice(0, -1);
            } else {
                display.innerText = '0';
            }
        }

        function calculate() {
            try {
                const result = eval(display.innerText);
                if (result === undefined || isNaN(result)) throw new Error();
                display.innerText = result;
                playSound('success');
            } catch (error) {
                display.innerText = 'Erro';
                playSound('error');
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
